name: Deploy to GitHub Pages

on:
  # Dispara o deploy sempre que houver um push na branch main
  push:
    branches: ["main"]
  # Permite rodar o workflow manualmente pela interface do GitHub
  workflow_dispatch:

# Define as permissões do token do GITHUB (necessário para o Pages)
permissions:
  contents: read
  pages: write
  id-token: write

# Permite apenas um deploy concorrente
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build do projeto
        run: npm run build
        env:
          VITE_APP_EDITION: lite

      - name: Fazer upload dos artefatos
        uses: actions/upload-pages-artifact@v3
        with:
          # O Vite gera os arquivos estáticos na pasta "dist"
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Fazer Deploy para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
